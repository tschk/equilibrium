# eq compiler catalogue — edit here instead of eq.rs

[[compiler]]
id = "zig"
lang = "Zig"
bin = "zig"
extra_paths = [
  "/usr/local/sbin",
  "/usr/local/bin",
  "/home/linuxbrew/.linuxbrew/bin",
  "/opt/homebrew/bin",
]
version_args = ["version"]
[compiler.install]
brew = "zig"
apt = "zig"
dnf = "zig"
pacman = "zig"
winget = "zig.zig"
scoop = "zig"
manual = "https://ziglang.org/download/"

