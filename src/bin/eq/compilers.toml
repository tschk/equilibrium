[[compiler]]
id = "dotnet"
lang = "C# (dotnet)"
bin = "dotnet"
extra_paths = [
  "/home/linuxbrew/.linuxbrew/bin",
  "/opt/homebrew/bin",
  "C:\\Program Files\\dotnet",
]
version_args = ["--version"]
[compiler.install]
brew = "dotnet"
apt = "dotnet-sdk-9.0"
dnf = "dotnet-sdk-9.0"
pacman = "dotnet-sdk"
winget = "Microsoft.DotNet.SDK.9"
scoop = "dotnet-sdk"
manual = "https://dot.net/"